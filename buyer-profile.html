<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Buyer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header / Navigation -->
<header>
    <div class="logo">FarmConnect</div>
    <nav>
        <a href="buyer-dashboard.html">Dashboard</a>
        <a href="buyer-browse.html">Browse Harvests</a>
        <a href="buyer-orders.html">Orders</a>
        <a href="buyer-profile.html" class="active">Profile</a>
        <a href="index.html">Logout</a>
        <select id="language-select" onchange="changeLanguage(this.value)">
            <option value="en" selected>English</option>
            <option value="si">සිංහල</option>
            <option value="ta">தமிழ்</option>
        </select>
    </nav>
</header>

<!-- Main Content -->
<main>
    <section class="profile">
        <h2>My Profile</h2>
        <div class="profile-container">
            <form action="#" method="POST">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" value="Saman Kumara" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" value="saman@example.com" required>

                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" name="phone" value="+94 77 123 4567" required>

                <label for="company">Company / Shop Name:</label>
                <input type="text" id="company" name="company" value="Saman’s Wholesale" required>

                <label for="payment">Preferred Payment Method:</label>
                <select id="payment" name="payment">
                    <option value="cash" selected>Cash</option>
                    <option value="bank">Bank Transfer</option>
                    <option value="digital">Digital Wallet</option>
                </select>

                <button type="submit" class="btn">Update Profile</button>
            </form>
        </div>
    </section>
</main>

<!-- Footer -->
<footer>
    <p>&copy; 2026 FarmConnect Platform. All Rights Reserved.</p>
</footer>

</body>
</html>
