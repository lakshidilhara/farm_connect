<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FarmConnect - Farmer Registration</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<div class="register-box">

<h1>FarmConnect</h1>
<h2>Farmer Registration</h2>

<form action="farmer-register-success.html" method="POST">

<label>Full Name</label>
<input type="text" placeholder="Enter your full name">

<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number">

<label>Location</label>
<input type="text" placeholder="Village / District">

<label>Farm Type</label>
<select>
<option>Rice Farming</option>
<option>Vegetable Farming</option>
<option>Fruit Farming</option>
<option>Mixed Crops</option>
</select>

<label>Password</label>
<input type="password" placeholder="Create password">

<label>Confirm Password</label>
<input type="password" placeholder="Confirm password">

<label>Upload Profile Photo</label>
<input type="file">

<button type="submit">Register</button>

<p class="login-link">
Already have an account? 
<a href="login.html">Login here</a>
</p>

</form>

</div>

</div>

</body>
</html>
