<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Harvest - Farmer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header>
        <div class="logo">FarmConnect</div>
        <nav>
            <a href="farmer-dashboard.html">Dashboard</a>
            <a href="farmer-add-harvest.html" class="active">Add Harvest</a>
            <a href="farmer-harvests.html">My Harvests</a>
            <a href="farmer-orders.html">Buyer Requests</a>
            <a href="index.html">Logout</a>
            <select id="language-select" onchange="changeLanguage(this.value)">
                <option value="en" selected>English</option>
                <option value="si">සිංහල</option>
                <option value="ta">தமிழ்</option>
            </select>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <div class="add-harvest-container">
            <h2>Add New Harvest</h2>
            <form action="harvest-added-success.html" method="POST">
                <label for="productName">Product Name:</label>
                <input type="text" id="productName" name="productName" placeholder="e.g., Vegetables, Rice">

                <label for="quantity">Quantity (kg/unit):</label>
                <input type="number" id="quantity" name="quantity" placeholder="Enter quantity">

                <label for="price">Price per Unit (LKR):</label>
                <input type="number" id="price" name="price" placeholder="Enter price per unit">

                <label for="harvestDate">Harvest Date:</label>
                <input type="date" id="harvestDate" name="harvestDate">

                <label for="image">Upload Photo (optional):</label>
                <input type="file" id="image" name="image" accept="image/*">

                <button type="submit" class="btn">Add Harvest</button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 AgriDirect. All Rights Reserved.</p>
    </footer>
</body>
</html>
