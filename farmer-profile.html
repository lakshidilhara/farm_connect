<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header / Navigation -->
<header>
    <div class="logo">FarmConnect</div>
    <nav>
        <a href="farmer-dashboard.html">Dashboard</a>
        <a href="farmer-add-harvest.html">Add Harvest</a>
        <a href="farmer-profile.html" class="active">Profile</a>
        <a href="index.html">Logout</a>
        <select id="language-select" onchange="changeLanguage(this.value)">
            <option value="en" selected>English</option>
            <option value="si">සිංහල</option>
            <option value="ta">தமிழ்</option>
        </select>
    </nav>
</header>

<!-- Main Content -->
<main>
    <section class="profile">
        <h2>My Profile</h2>

        <div class="profile-container">
            <div class="profile-photo">
                <img src="images/farmer-placeholder.jpg" alt="Farmer Photo">
            </div>

            <div class="profile-details">
                <form action="#" method="POST">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" value="H M Karunadasa" required>

                    <label for="farm">Farm Type:</label>
                    <input type="text" id="farm" name="farm" value="Mixed Crops" required>

                    <label for="location">Location:</label>
                    <input type="text" id="location" name="location" value="Monaragala, Sri Lanka" required>

                    <label for="contact">Contact Number:</label>
                    <input type="tel" id="contact" name="contact" value="+94 77 123 4567" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" value="farmer@example.com" required>

                    <button type="submit" class="btn">Update Profile</button>
                </form>
            </div>
        </div>
    </section>
</main>

<!-- Footer -->
<footer>
    <p>&copy; 2026 FarmConnect Platform. All Rights Reserved.</p>
</footer>

</body>
</html>
