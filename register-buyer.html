<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Buyer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>


<!-- Main Content -->
<main>
    <div class="register-box">
        <h1>Buyer Registration</h1>
        <h2>Create your account</h2>
        <form action="buyer-register-success.html" method="POST">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your name">

            <label for="businessName">Business Name:</label>
            <input type="text" id="businessName" name="businessName" placeholder="Shop/Restaurant Name">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter email">

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter phone number">

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Create a password">

            <label for="location">Location:</label>
            <input type="text" id="location" name="location" placeholder="City, Area">

            <button type="submit" class="btn">Register</button>
        </form>
        <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
    </div>
</main>

<!-- Footer -->
<footer>
    <p>&copy; 2026 FarmConnect Platform</p>
</footer>

</body>
</html>
